<!--
  Homepage header HTML snippet extracted from src/components/landing/Navbar.jsx
  Notes:
  - Tailwind utility classes are preserved so this can be dropped into Tailwind-based pages.
  - Interactive behaviors (dropdowns, theme toggle logic, mobile toggling, i18n switching)
    are represented as plain HTML controls and should be wired with your JS framework.
-->
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-white/95 backdrop-blur-lg shadow-lg shadow-slate-900/5">
  <div class="container mx-auto px-4 md:px-6">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <img
          src="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/user_6962369d7645fd9abc56cb8f/9f16258e0_Rawajcard.png"
          alt="Rawajcard"
          class="h-10 w-auto"
        />
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex items-center gap-1" aria-label="Main navigation">
        <a href="/products" class="px-4 py-2 text-sm font-medium rounded-lg text-slate-700 hover:text-teal-600 hover:bg-slate-50 transition-colors">
          Products
        </a>
        <a href="/nfc-cards" class="px-4 py-2 text-sm font-medium rounded-lg text-slate-700 hover:text-teal-600 hover:bg-slate-50 transition-colors">
          NFC Cards
        </a>
        <a href="/pricing" class="px-4 py-2 text-sm font-medium rounded-lg text-slate-700 hover:text-teal-600 hover:bg-slate-50 transition-colors">
          Pricing
        </a>
      </nav>

      <!-- Right Side -->
      <div class="flex items-center gap-4">
        <button
          type="button"
          aria-label="Toggle theme"
          class="p-2 rounded-lg hover:bg-slate-100 transition-colors"
        >
          <span class="text-slate-600">🌙</span>
        </button>

        <a
          href="/free-tools"
          class="hidden lg:inline-flex items-center gap-1 px-4 py-2 text-sm font-medium text-slate-700 hover:text-teal-600 transition-colors rounded-lg hover:bg-slate-50"
        >
          Free Tools
        </a>

        <div class="hidden md:flex items-center gap-2" aria-label="Language selector">
          <button type="button" class="px-3 py-1.5 text-sm font-medium rounded-lg bg-teal-100 text-teal-700">EN</button>
          <button type="button" class="px-3 py-1.5 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-100">عربي</button>
        </div>

        <a
          href="/dashboard"
          class="inline-flex items-center justify-center bg-gradient-to-r from-teal-600 to-blue-500 hover:from-teal-700 hover:to-blue-600 text-white rounded-full px-6 py-2 shadow-lg shadow-teal-500/20"
        >
          Create your card
        </a>

        <button type="button" aria-label="Open mobile menu" class="lg:hidden p-2 text-slate-600">
          ☰
        </button>
      </div>
    </div>
  </div>
</header>
